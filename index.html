<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskBoard Kanban</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1020;
            color: #f0e0f0;
            min-height: 100vh;
            overflow-x: auto;
        }

        #root {
            min-height: 100vh;
        }

        /* Header */
        .app-header {
            background: linear-gradient(135deg, #2d1528, #3d1a38);
            padding: 20px 32px;
            border-bottom: 2px solid #6b2a5e;
            box-shadow: 0 4px 20px rgba(180, 60, 140, 0.15);
        }

        .app-header h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #f472b6, #fb7185, #e879a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .app-header p {
            color: #c084a8;
            margin-top: 4px;
            font-size: 0.9rem;
        }

        /* Board */
        .board {
            display: flex;
            gap: 24px;
            padding: 32px;
            min-height: calc(100vh - 100px);
            align-items: flex-start;
        }

        /* Columns */
        .column {
            flex: 1;
            min-width: 300px;
            max-width: 380px;
            background: #241530;
            border-radius: 16px;
            border: 1px solid #3d1a38;
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .column.drag-over {
            box-shadow: 0 0 30px rgba(244, 114, 182, 0.3);
            border-color: #f472b6;
        }

        .column-header {
            padding: 16px 20px;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .column-header .count {
            background: rgba(255,255,255,0.15);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .column-todo .column-header {
            background: linear-gradient(135deg, #9f1239, #be123c);
        }

        .column-inprogress .column-header {
            background: linear-gradient(135deg, #9d174d, #be185d);
        }

        .column-done .column-header {
            background: linear-gradient(135deg, #831843, #a21caf);
        }

        .column-body {
            padding: 16px;
            min-height: 200px;
        }

        /* Cards */
        .card {
            background: #2e1a38;
            border: 1px solid #4a2050;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 12px;
            cursor: grab;
            transition: all 0.2s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244, 114, 182, 0.15);
            border-color: #f472b6;
        }

        .card.dragging {
            opacity: 0.5;
            transform: rotate(3deg);
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fce7f3;
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 0.8rem;
            color: #c084a8;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .card:hover .card-actions {
            opacity: 1;
        }

        .card-btn {
            background: rgba(244, 114, 182, 0.2);
            border: none;
            color: #f472b6;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .card-btn:hover {
            background: rgba(244, 114, 182, 0.4);
        }

        .card-btn.delete:hover {
            background: rgba(239, 68, 68, 0.4);
            color: #fca5a5;
        }

        /* Add card */
        .add-card-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px dashed #4a2050;
            border-radius: 12px;
            color: #c084a8;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .add-card-btn:hover {
            border-color: #f472b6;
            color: #f472b6;
            background: rgba(244, 114, 182, 0.05);
        }

        .add-card-form {
            background: #2e1a38;
            border: 1px solid #4a2050;
            border-radius: 12px;
            padding: 14px;
        }

        .add-card-form input,
        .add-card-form textarea {
            width: 100%;
            padding: 10px 12px;
            background: #1a1020;
            border: 1px solid #4a2050;
            border-radius: 8px;
            color: #fce7f3;
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-family: inherit;
            resize: vertical;
        }

        .add-card-form input:focus,
        .add-card-form textarea:focus {
            outline: none;
            border-color: #f472b6;
            box-shadow: 0 0 0 3px rgba(244, 114, 182, 0.1);
        }

        .add-card-form textarea {
            min-height: 60px;
        }

        .form-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-primary {
            padding: 8px 16px;
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }

        .btn-secondary {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #4a2050;
            border-radius: 8px;
            color: #c084a8;
            cursor: pointer;
            font-size: 0.85rem;
            transition: border-color 0.2s;
        }

        .btn-secondary:hover {
            border-color: #f472b6;
            color: #f472b6;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 5, 15, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: #241530;
            border: 1px solid #4a2050;
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            animation: slideUp 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal h2 {
            color: #f472b6;
            margin-bottom: 8px;
            font-size: 1.3rem;
        }

        .modal-column-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .badge-todo { background: #9f1239; }
        .badge-inprogress { background: #9d174d; }
        .badge-done { background: #831843; }

        .modal-desc {
            color: #c084a8;
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .modal-meta {
            color: #7c5080;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .modal-close {
            padding: 10px 24px;
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: transform 0.1s;
        }

        .modal-close:hover {
            transform: scale(1.03);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 24px 16px;
            color: #6b4070;
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .board {
                flex-direction: column;
                align-items: stretch;
                padding: 16px;
            }
            .column {
                max-width: 100%;
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="app.jsx"></script>
</body>
</html>
